# Example .nn/config.toml (project-level config)
# Place this in your project's .nn/ directory.
# Project config defines the schema and shared queries — not user preferences.

# Use a different schema for this project
schema = "ado"

# Saved queries shared among project members.
# Each query has an args string (key=value pairs) and optional order (default 100).
# Lower order = earlier in the saved query bar.
#
# Schema presets are included by default. Project queries with the same name
# override the schema preset. To clear all schema presets, set inherit = false:
#
#   [queries]
#   inherit = false

[queries.backlog]
args = "tag=backlog"

[queries.active-bugs]
order = 5
args = "type=bug status=active"

[queries.my-features]
args = "type=feature status=active"
