# notenav user config – uncomment and change values to override defaults.
# See https://github.com/jqueiroz/notenav/blob/main/docs/configuration.md

# Choose a built-in workflow: zenith, cuboid, ado, gtd, zettelkasten
# default_workflow = "zenith"

# [defaults]
# sort_by = "created"           # created | modified | title | priority
# sort_reverse = false          # true to reverse the default sort direction
# group_by = "none"             # none | type | status
# type_visibility = "all"          # typed_only | all
# archive_visibility = "hide"   # hide | show | only – which archive statuses appear
# wrap_preview = false          # true to wrap the preview pane by default

# Tie-breaking chains: when notes share the same primary sort value,
# these fields break the tie in order.
# [defaults.sort_chain]
# priority = ["status", "created", "title"]
# status   = ["priority", "created", "title"]
# created  = ["title"]
# modified = ["title"]
# title    = ["created"]

# [ui]
# initial_header_mode = "guided"  # "clean" | "guided" – toggle at runtime with h
# editor = ""                   # empty = $EDITOR, then nvim/vim/vi/nano/emacs
# command_prompt = " "          # prompt in normal (command) mode (blank to minimize input area)
# search_prompt = "/ "          # prompt in search mode (/ key and ad-hoc -i)
# exit_message = "none"         # "none" or "fortune" (show a fun quote on exit)
# priority_plus = "demote"      # "demote": + lowers urgency (P1→P2)
#                               # "promote": + raises urgency (P2→P1)
# after_create = "edit"         # "edit" (open in editor) or "none" (just create)
# previewer = ["bat", "glow", "mdcat"]  # tries each in order; other options: plain, custom
# previewer_custom_command = ""  # command when previewer includes "custom" (file as $1)
# delete_method = "trash"        # "trash" (trash-put / gio trash) or "rm" (permanent)
# delete_confirm = "always"      # "always" (ask before deleting) or "never"
# pin_mode = "auto"             # "auto" (only when item would leave view) or "always"

# [ui.previewer_flags]
# bat = ["--theme=Nord"]           # extra flags appended to bat
# glow = ["-s", "dark"]            # extra flags appended to glow
# mdcat = ["--local"]              # extra flags appended to mdcat

# [refresh]
# mode = "watch"              # "watch" | "poll" | "manual"
# poll_interval = 30          # seconds between polls (poll mode only)
# auto_refresh_note_limit = 0  # disable auto-refresh above this note count (0 = no limit)

# Override workflow colors – these merge on top, so only specify what you
# want to change.
#
# [type.task]
# color = "blue"                # change tasks from cyan to blue
#
# [status.colors]
# active = "bold-green"         # bold green for active
#
# [priority.colors]
# 1 = "red"                     # non-bold red for P1
