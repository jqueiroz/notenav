# notenav user config – uncomment and change values to override defaults.
# See https://github.com/jqueiroz/notenav/blob/main/docs/configuration.md

# Choose a built-in workflow: zenith, cubic, ado, gtd, zettelkasten
# default_workflow = "zenith"

# [defaults]
# sort_by = "created"           # created | modified | title | priority
# sort_reverse = false          # true to reverse the default sort direction
# group_by = ""                 # "" (none) | type | status
# show_archive = false          # true to show done/removed by default
# wrap_preview = false          # true to wrap the preview pane by default

# [ui]
# editor = ""                   # empty = $EDITOR, then nvim/vim/vi/nano/emacs
# command_prompt = ": "         # prompt in normal (command) mode
# search_prompt = "/ "          # prompt in ad-hoc interactive mode
# exit_message = "none"         # "none" or "fortune" (fun quote on exit)
# priority_plus = "demote"      # "demote": + lowers urgency (P1→P2)
#                               # "promote": + raises urgency (P2→P1)
# after_create = "edit"         # "edit" (open in editor) or "none" (just create)
# previewer = ["bat", "glow", "mdcat"]  # fallback list (bat | glow | mdcat | plain | custom)
# previewer_custom_command = ""  # command when previewer includes "custom" (file as $1)

# [ui.previewer_flags]
# bat = ""                        # extra flags appended to bat (e.g. "--theme=Nord")
# glow = ""                       # extra flags appended to glow (e.g. "-s light")
# mdcat = ""                      # extra flags appended to mdcat (e.g. "--local")

# [refresh]
# mode = "watch"              # "watch" | "poll" | "manual"
# poll_interval = 30          # seconds between polls (poll mode only)
# max_files = 0               # disable auto-refresh above this note count (0 = no limit)

# Override workflow colors – these merge on top, so only specify what you
# want to change.
#
# [type.task]
# color = "34"                  # change tasks from cyan to blue
#
# [status.colors]
# active = "32;1"               # bold green for active
#
# [priority.colors]
# 1 = "31"                      # non-bold red for P1
