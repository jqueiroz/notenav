# Example custom workflow
# Save as .nn/workflow.toml in your project directory.

[meta]
name = "My Workflow"
description = "Custom workflow example"
schema_version = 1

# Define your note types (note categories).
# values: valid types; array order = display order in grouped view
# icon: single character shown in the list
# color: named color (red, green, yellow, blue, magenta, cyan, dim, bold-red, etc.)
#   Raw ANSI codes ("31", "31;1") also accepted.
# default_color: used for types not listed below

[type]
default_color = "cyan"
values = ["feature", "bug", "doc"]

[type.feature]
icon = "◆"
color = "cyan"
description = "New feature"

[type.bug]
icon = "✖"
color = "red"
description = "Bug fix"

[type.doc]
icon = "▪"
color = "yellow"
description = "Documentation"

# Status values and their lifecycle transitions.
# values: all valid statuses; array order = display order in grouped view
# archive: statuses hidden by default
# filter_cycle: subset for ]/[ preset cycling ("all" is auto-prepended); fs picker shows all

[status]
values = ["in-progress", "review", "open", "done"]
initial = "open"
archive = ["done"]
filter_cycle = ["open", "in-progress", "review", "done"]
default_color = "dim"   # used for statuses not listed below

[status.colors]
open = "dim"
in-progress = "green"
review = "blue"
done = "dim"

[status.descriptions]
open = "Not yet started"
in-progress = "Work underway"
review = "Waiting for feedback"
done = "Completed"

# forward/reverse define what happens when you press a/A on a note
[status.lifecycle.forward]
open = "in-progress"
in-progress = "review"
review = "done"
done = "open"

[status.lifecycle.reverse]
done = "review"
review = "in-progress"
in-progress = "open"
open = "done"

# Priority levels. Set enabled = false to disable priority entirely.
# Values can be numeric ("1","2","3") or named ("critical","high","low").
# Array order = sort order (first = highest priority).
# Labels are optional short strings for the TUI; omit to show "P{value}".
[priority]
values = ["critical", "high", "low"]
filter_cycle = ["critical", "high", "low"]
unset_position = "last"
default_color = "yellow"

[priority.labels]
critical = "P!"
high = "P+"
low = "P-"

[priority.colors]
critical = "bold-red"
high = "yellow"
low = "dim"

[priority.lifecycle.up]
low = "high"
high = "critical"

[priority.lifecycle.down]
critical = "high"
high = "low"
