# Example custom workflow
# Save as .nn/workflow.toml in your project directory.

[meta]
name = "My Workflow"
description = "Custom workflow example"

# Define your entity types (note categories).
# values: valid types; array order = display order in grouped view
# icon: single character shown in the list
# color: ANSI color code (e.g. 31=red, 32=green, 33=yellow, 34=blue, 35=magenta, 36=cyan)
# default_color: used for entity types not listed below

[entity]
default_color = "36"
values = ["feature", "bug", "doc"]

[entity.feature]
icon = "◆"
color = "36"
description = "New feature"

[entity.bug]
icon = "✖"
color = "31"
description = "Bug fix"

[entity.doc]
icon = "▪"
color = "33"
description = "Documentation"

# Status values and their lifecycle transitions.
# values: all valid statuses; array order = display order in grouped view
# archive: statuses hidden by default (toggle with 'z')
# filter_cycle: order when pressing 's' to cycle ("all" is auto-prepended)

[status]
values = ["in-progress", "review", "open", "done"]
initial = "open"
archive = ["done"]
filter_cycle = ["open", "in-progress", "review", "done"]
default_color = "90"   # used for statuses not listed below

[status.colors]
open = "90"
in-progress = "32"
review = "34"
done = "90"

# forward/reverse define what happens when you press a/A on a note
[status.lifecycle.forward]
open = "in-progress"
in-progress = "review"
review = "done"
done = "open"

[status.lifecycle.reverse]
done = "review"
review = "in-progress"
in-progress = "open"
open = "done"

# Priority levels. Set enabled = false to disable priority entirely.
# Values can be numeric ("1","2","3") or named ("critical","high","low").
# Array order = sort order (first = highest priority).
# Labels are optional short strings for the TUI; omit to show "P{value}".
[priority]
values = ["critical", "high", "low"]
filter_cycle = ["critical", "high", "low"]
unset_position = "last"
default_color = "33"

[priority.labels]
critical = "P!"
high = "P+"
low = "P-"

[priority.colors]
critical = "31;1"
high = "33"
low = "90"

[priority.lifecycle.up]
low = "high"
high = "critical"

[priority.lifecycle.down]
critical = "high"
high = "low"
