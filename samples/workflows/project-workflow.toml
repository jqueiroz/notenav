# Example .nn/workflow.toml (project workflow)
# Place this in your project's .nn/ directory.
# Defines the workflow and shared queries for the project.

# Extend a built-in workflow for this project
extends = "ado"

# Query presets shared among project members.
# Each preset has an args string (key=value pairs) and optional order (default 100).
# Lower order = earlier in the query preset bar.
#
# Workflow presets are included by default. Project queries with the same name
# override the workflow preset. To clear all inherited presets, add inherit = false
# as the first key under [queries]:
#
#   [queries]
#   inherit = false

[queries.backlog]
args = "tag=backlog"

[queries.active-bugs]
order = 5                          # override order to appear before ado's default (order 10)
args = "type=bug status=active"

[queries.my-features]
args = "type=feature status=active"
