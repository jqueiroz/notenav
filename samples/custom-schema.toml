# Example custom schema
# Save as ~/.config/notenav/schemas/<name>.toml or .nn/schemas/<name>.toml
# Then set default_schema = "<name>" in your config.

[meta]
name = "My Workflow"
description = "Custom schema example"

# Define your entity types (note categories).
# icon: single character shown in the list
# color: ANSI color code (e.g. 31=red, 32=green, 33=yellow, 34=blue, 35=magenta, 36=cyan)
# default_color: used for entity types not listed below
# display_order: controls sort order in grouped view

[entity]
default_color = "36"

[entity.feature]
icon = "◆"
color = "36"
description = "New feature"
display_order = 1

[entity.bug]
icon = "✖"
color = "31"
description = "Bug fix"
display_order = 2

[entity.doc]
icon = "▪"
color = "33"
description = "Documentation"
display_order = 3

# Status values and their lifecycle transitions.
# values: all possible statuses
# display_order: order for group headers
# archive: statuses hidden by default (toggle with 'z')
# filter_cycle: order when pressing 's' to cycle (include "" for "all")

[status]
values = ["open", "in-progress", "review", "done"]
display_order = ["in-progress", "review", "open", "done"]
archive = ["done"]
filter_cycle = ["", "open", "in-progress", "review", "done"]
default_color = "90"   # used for statuses not listed below

[status.colors]
open = "90"
in-progress = "32"
review = "34"
done = "90"

# forward/reverse define what happens when you press a/A on a note
[status.lifecycle.forward]
open = "in-progress"
in-progress = "review"
review = "done"
done = "open"

[status.lifecycle.reverse]
done = "review"
review = "in-progress"
in-progress = "open"
open = "done"

# Priority levels. Set enabled = false to disable priority entirely.
# Values can be numeric ("1","2","3") or named ("critical","high","low").
# Array order = sort order (first = highest priority).
# Labels are optional short strings for the TUI; omit to show "P{value}".
[priority]
values = ["critical", "high", "low"]
filter_cycle = ["", "critical", "high", "low"]
unset_position = "last"

[priority.labels]
critical = "P!"
high = "P+"
low = "P-"

[priority.colors]
critical = "31;1"
high = "33"
low = "90"

[priority.lifecycle.up]
"" = "low"
low = "high"
high = "critical"

[priority.lifecycle.down]
critical = "high"
high = "low"
