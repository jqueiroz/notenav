# Compass — the default notenav schema
# Simple task/idea/reference workflow with priority and status tracking

[meta]
name = "Compass"
description = "Simple task/idea/reference workflow"

# --- Entity types ---
# Each entity represents a kind of note. Shown as icon + name in the TUI.
# icon: single character displayed in the list
# color: ANSI color code (31=red, 32=green, 33=yellow, 34=blue, 35=magenta, 36=cyan)
# display_order: controls grouping order when group-by-type is active
# default_color: fallback for entity types not explicitly listed

[entity]
default_color = "36"   # cyan

[entity.task]
icon = "◆"
color = "36"           # cyan
description = "Concrete, actionable unit of work"
display_order = 1

[entity.idea]
icon = "✦"
color = "35"           # magenta
description = "Needs further exploration/research (may subsequently evolve into one or more tasks)"
display_order = 2

[entity.reference]
icon = "▪"
color = "33"           # yellow
description = "Living documentation; continually updated as understanding grows"
display_order = 3

# --- Statuses ---
# values: all valid statuses a note can have
# display_order: order for group headers when group-by-status is active
# archive: statuses hidden by default; press 'z' to toggle visibility
# filter_cycle: order when pressing 's' to cycle the status filter ("" = all)
# default_color: fallback for statuses not explicitly listed in [status.colors]
#
# "removed" is in values but omitted from filter_cycle and lifecycle —
# it's a tombstone status, only reachable via bulk edit or manual frontmatter change.

[status]
values = ["new", "active", "blocked", "done", "removed"]
display_order = ["active", "blocked", "new", "done", "removed"]
archive = ["done", "removed"]
filter_cycle = ["", "new", "active", "blocked", "done"]
default_color = "90"   # dim

[status.colors]
new = "90"             # dim
active = "32"          # green
blocked = "31"         # red
done = "90"            # dim
removed = "90"         # dim

# Lifecycle transitions define what happens when you press 'a' (forward) or 'A' (reverse)
# on a note. Each key maps to the next status in that direction.

[status.lifecycle.forward]
new = "active"
active = "done"
done = "new"
blocked = "active"

[status.lifecycle.reverse]
done = "active"
active = "new"
new = "done"
blocked = "new"

# --- Priority ---
# enabled: set to false to disable priority entirely (see zettelkasten schema)
# values: valid priority levels
# filter_cycle: order when pressing 'p' to cycle the priority filter ("" = all)
# unset_position: where unprioritized notes sort ("first" or "last")

[priority]
values = ["1", "2", "3", "4"]
filter_cycle = ["", "1", "2", "3", "4"]
unset_position = "last"

[priority.colors]
1 = "31;1"             # bold red
2 = "33"               # yellow
3 = "33"               # yellow (default)
4 = "33"               # yellow (default)

# Lifecycle for '+' (up) and '-' (down) keybindings.
# "" = no priority set; bumping up from unset starts at the lowest level.

[priority.lifecycle.up]
"" = "4"
4 = "3"
3 = "2"
2 = "1"

[priority.lifecycle.down]
1 = "2"
2 = "3"
3 = "4"

# --- zk integration ---
# format: zk list --format string; columns are tab-separated
# columns: names for each tab-separated field (for documentation; matches format order)
