# Zettelkasten schema
# Slip-box method: fleeting → literature → permanent notes

[meta]
name = "Zettelkasten"
description = "Slip-box method for knowledge management"

# --- Entity types ---
# Follows the classic Zettelkasten note progression:
# fleeting (quick capture) → literature (source notes) → permanent (atomic ideas)

[entity]
default_color = "36"   # cyan
display_order = ["fleeting", "literature", "permanent"]

[entity.fleeting]
icon = "◇"
color = "33"           # yellow
description = "Quick capture, to be processed"

[entity.literature]
icon = "▪"
color = "34"           # blue
description = "Notes from a source"

[entity.permanent]
icon = "◆"
color = "36"           # cyan
description = "Atomic, fully developed idea"

# --- Statuses ---
# Linear maturity progression: draft → review → mature → archived.
# All statuses participate in lifecycle (no tombstones).

[status]
values = ["draft", "review", "mature", "archived"]
display_order = ["review", "draft", "mature", "archived"]
archive = ["archived"]
filter_cycle = ["draft", "review", "mature", "archived"]
default_color = "90"   # dim

[status.colors]
draft = "33"           # yellow
review = "34"          # blue
mature = "32"          # green
archived = "90"        # dim

# 'a' advances maturity, 'A' reverses it

[status.lifecycle.forward]
draft = "review"
review = "mature"
mature = "archived"
archived = "draft"

[status.lifecycle.reverse]
archived = "mature"
mature = "review"
review = "draft"
draft = "archived"

# --- Priority ---
# Disabled — Zettelkasten doesn't use priority; notes mature by connection density.

[priority]
enabled = false

