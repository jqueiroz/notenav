# Getting Things Done schema
# Entities = what it is, statuses = which GTD list it lives on

[meta]
name = "GTD"
description = "Getting Things Done capture-and-process workflow"

[entity]
default_color = "36"   # cyan — fallback for unknown entity types

[entity.action]
icon = "◆"
color = "36"           # cyan
description = "Single concrete action"
display_order = 1

[entity.project]
icon = "◈"
color = "35"           # magenta
description = "Multi-step outcome"
display_order = 2

[entity.reference]
icon = "▪"
color = "33"           # yellow
description = "Non-actionable reference material"
display_order = 3

[status]
values = ["inbox", "next", "waiting", "someday", "done", "dropped"]
display_order = ["next", "waiting", "inbox", "someday", "done", "dropped"]
archive = ["done", "dropped"]
filter_cycle = ["", "inbox", "next", "waiting", "someday", "done"]
default_color = "90"   # dim — fallback for unknown statuses

[status.colors]
inbox = "33"           # yellow — needs processing
next = "32"            # green — ready to do
waiting = "34"         # blue — blocked on someone else
someday = "90"         # dim — parked
done = "90"            # dim
dropped = "90"         # dim

[status.lifecycle.forward]
inbox = "next"
next = "done"
waiting = "next"
someday = "next"
done = "inbox"
dropped = "inbox"

[status.lifecycle.reverse]
done = "next"
next = "inbox"
inbox = "someday"
waiting = "inbox"
someday = "dropped"
dropped = "done"

[priority]
values = ["1", "2", "3"]
filter_cycle = ["", "1", "2", "3"]
unset_sort_value = 9

[priority.colors]
1 = "31;1"             # bold red
2 = "33"               # yellow
3 = "90"               # dim

[priority.lifecycle.up]
"" = "3"
3 = "2"
2 = "1"

[priority.lifecycle.down]
1 = "2"
2 = "3"

[zk]
format = '{{metadata.type}}\t{{metadata.status}}\t{{metadata.priority}}\t{{tags}}\t{{title}}\t{{absPath}}\t{{modified}}\t{{created}}'
columns = ["type", "status", "priority", "tags", "title", "absPath", "modified", "created"]
template_pattern = "{type}.md"
