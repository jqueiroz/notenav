# Azure DevOps schema
# Feature/task/bug workflow mirroring ADO work item types

[meta]
name = "Azure DevOps"
description = "Feature/task/bug workflow inspired by Azure DevOps"

# --- Entity types ---

[entity]
default_color = "36"   # cyan

[entity.feature]
icon = "◇"
color = "35"           # magenta
description = "Planned capability or improvement"
display_order = 1

[entity.task]
icon = "◆"
color = "36"           # cyan
description = "Discrete unit of work"
display_order = 2

[entity.bug]
icon = "✖"
color = "31"           # red
description = "Defect to fix"
display_order = 4

# --- Statuses ---
# Follows the ADO new → active → resolved → closed progression.
# "removed" is a tombstone, omitted from filter_cycle and lifecycle.

[status]
values = ["new", "active", "resolved", "closed", "removed"]
display_order = ["active", "new", "resolved", "closed", "removed"]
archive = ["closed", "removed"]
filter_cycle = ["", "new", "active", "resolved", "closed"]
default_color = "90"   # dim

[status.colors]
new = "90"             # dim
active = "32"          # green
resolved = "34"        # blue
closed = "90"          # dim
removed = "90"         # dim

# 'a' advances forward, 'A' reverses

[status.lifecycle.forward]
new = "active"
active = "resolved"
resolved = "closed"
closed = "new"

[status.lifecycle.reverse]
closed = "resolved"
resolved = "active"
active = "new"
new = "closed"

# --- Priority ---
# 1 = critical, 4 = low

[priority]
values = ["1", "2", "3", "4"]
filter_cycle = ["", "1", "2", "3", "4"]
unset_position = "last"

[priority.colors]
1 = "31;1"             # bold red — critical
2 = "33"               # yellow — high
3 = "33"               # yellow — medium
4 = "90"               # dim — low

[priority.lifecycle.up]
"" = "4"
4 = "3"
3 = "2"
2 = "1"

[priority.lifecycle.down]
1 = "2"
2 = "3"
3 = "4"

