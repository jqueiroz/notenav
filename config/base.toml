# notenav base configuration
# Ships with notenav; user config overlays on top for preferences.
# User config:    ~/.config/notenav/config.toml (preferences + personal queries)
# Project:        .nn/workflow.toml (workflow definition + project queries)

default_workflow = "zenith"

[defaults]
sort_by = "created"
sort_reverse = false
group_by = ""
show_archive = false
wrap_preview = false

[ui]
editor = ""              # empty = $EDITOR, then nvim/vim/vi/nano/emacs
command_prompt = ": "    # prompt in normal (command) mode
search_prompt = "/ "     # prompt in ad-hoc interactive mode
exit_message = "none"    # "none" or "fortune" (show a fun quote on exit)
priority_plus = "demote" # what + key does: "demote" = lower urgency (P1→P2), "promote" = raise urgency (P2→P1)
after_create = "edit"    # "edit" (open in editor) or "none" (just create)
previewer = ["bat", "glow", "mdcat"] # fallback list: tries each in order, uses first found
previewer_custom_command = "" # command when previewer = "custom" (file path passed as $1)
