# notenav base configuration
# Ships with notenav; user config overlays on top for preferences.
# User config:    ~/.config/notenav/config.toml (preferences)
# Project:        .nn/workflow.toml (workflow definition + project queries)

default_workflow = "zenith"  # "zenith" | "cuboid" | "ado" | "gtd" | "zettelkasten"

[defaults]
sort_by = "priority"      # "created" | "modified" | "title" | "priority"
sort_reverse = false       # true to reverse the default sort direction
group_by = "type"          # "none" | "type" | "status"
type_visibility = "all"           # "typed_only" | "all"
archive_visibility = "hide"  # "hide" | "show" | "only" – which archive statuses appear
wrap_preview = false       # true to wrap the preview pane by default

# Tie-breaking chains: when two notes share the same primary sort value,
# the chain fields break the tie in order.  Each field uses its natural
# direction (priority → values array order, status → display_order,
# created/modified → newest first, title → alphabetical).
# sort_reverse only affects the primary sort; chain fields keep their
# natural direction so the secondary grouping stays intuitive.
[defaults.sort_chain]
priority = ["status", "created", "title"]   # same priority → group by status, then newest, then alphabetical
status   = ["priority", "created", "title"] # same status → most urgent first, then newest, then alphabetical
created  = ["title"]                        # same timestamp (rare) → alphabetical
modified = ["title"]                        # same timestamp (rare) → alphabetical
title    = ["created"]                      # same title (rare) → newest first

[ui]
initial_header_mode = "guided"  # "clean" | "guided" – toggle at runtime with h
editor = ""              # empty = $EDITOR, then nvim/vim/vi/nano/emacs
command_prompt = " "     # prompt in normal (command) mode (blank to minimize input area)
search_prompt = "/ "     # prompt in search mode (/ key and ad-hoc -i)
exit_message = "none"    # "none" or "fortune" (show a fun quote on exit)
priority_plus = "demote" # what + key does: "demote" = lower urgency (P1→P2), "promote" = raise urgency (P2→P1)
after_create = "edit"    # "edit" (open in editor) or "none" (just create)
previewer = ["bat", "glow", "mdcat"] # fallback list: tries each in order, uses first found
previewer_custom_command = "" # command when previewer includes "custom" (file path passed as $1)
delete_method = "trash"    # "trash" (trash-put / gio trash) or "rm" (permanent delete)
delete_confirm = "always"  # "always" or "never"
pin_mode = "auto"          # "auto" (only when item would leave view) | "always"

[ui.previewer_flags]
bat = []       # extra flags appended to bat (notenav always passes -p --color always)
glow = []      # extra flags appended to glow (notenav always passes -w $cols)
mdcat = []     # extra flags appended to mdcat (notenav always passes --columns $cols)

[refresh]
mode = "watch"         # "watch" | "poll" | "manual"
poll_interval = 30     # seconds between polls (poll mode only)
auto_refresh_note_limit = 0  # disable auto-refresh above this note count (0 = no limit)
