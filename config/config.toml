# notenav default configuration
# This file ships with notenav and provides baseline defaults.
# User overrides: ~/.config/notenav/config.toml
# Project overrides: .nn/config.toml

default_schema = "compass"

[defaults]
sort = "created"
group = "type"
archive = false

[ui]
editor = ""            # empty = $EDITOR or nvim
prompt = ": "

[zk]
format = '{{metadata.type}}\t{{metadata.status}}\t{{metadata.priority}}\t{{tags}}\t{{title}}\t{{absPath}}\t{{modified}}\t{{created}}'
columns = ["type", "status", "priority", "tags", "title", "absPath", "modified", "created"]
template_pattern = "{type}.md"
