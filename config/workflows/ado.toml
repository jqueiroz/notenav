# Azure DevOps workflow
# Feature/task/bug workflow mirroring ADO work item types

[meta]
name = "Azure DevOps"
description = "Feature/task/bug workflow inspired by Azure DevOps"
schema_version = 1

# --- Note types ---

[type]
default_color = "cyan"
values = ["feature", "task", "bug"]

[type.feature]
icon = "◇"
color = "magenta"
description = "Planned capability or improvement"

[type.task]
icon = "◆"
color = "cyan"
description = "Discrete unit of work"

[type.bug]
icon = "✖"
color = "red"
description = "Defect to fix"

# --- Statuses ---
# Follows the ADO new → active → resolved → closed progression.
# "removed" is a tombstone, omitted from filter_cycle and lifecycle.

[status]
values = ["active", "new", "resolved", "closed", "removed"]
initial = "new"
archive = ["closed", "removed"]
filter_cycle = ["new", "active", "resolved", "closed"]
default_color = "dim"

[status.colors]
new = "dim"
active = "green"
resolved = "blue"
closed = "dim"
removed = "dim"

[status.descriptions]
new = "Not yet triaged"
active = "In progress"
resolved = "Fix or feature complete, pending verification"
closed = "Verified and closed"
removed = "Discarded or no longer relevant"

# 'a' advances forward, 'A' reverses

[status.lifecycle.forward]
new = "active"
active = "resolved"
resolved = "closed"
closed = "new"

[status.lifecycle.reverse]
closed = "resolved"
resolved = "active"
active = "new"
new = "closed"

# --- Priority ---
# 1 = critical, 4 = low

[priority]
values = ["1", "2", "3", "4"]
filter_cycle = ["1", "2", "3", "4"]
unset_position = "last"
default_color = "yellow"

[priority.colors]
1 = "bold-red"         # critical
2 = "yellow"           # high
3 = "yellow"           # medium
4 = "dim"              # low

[priority.lifecycle.up]
4 = "3"
3 = "2"
2 = "1"

[priority.lifecycle.down]
1 = "2"
2 = "3"
3 = "4"

# --- Query presets ---

[queries.active-bugs]
order = 10
args = "type=bug status=active"

[queries.p1-features]
order = 20
args = "type=feature priority=1"

[queries.new-items]
order = 30
args = "status=new"

