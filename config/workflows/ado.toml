# Azure DevOps workflow
# Feature/task/bug workflow mirroring ADO work item types

[meta]
name = "ADO"
description = "Feature/task/bug workflow inspired by Azure DevOps"
schema_version = 1

# --- Note types ---
# Each type represents a kind of note. Shown as icon + name in the TUI.
# values: valid types; array order = display order in grouped view
# icon: single character displayed in the list
# color: named color (red, green, yellow, blue, magenta, cyan, dim, bold-red, etc.)
#   Raw ANSI codes ("31", "31;1") also accepted.
# default_color: fallback for types not explicitly listed

[type]
default_color = "cyan"
values = ["feature", "task", "bug"]

[type.feature]
icon = "◇"
color = "magenta"
description = "Planned capability or improvement"

[type.task]
icon = "◆"
color = "cyan"
description = "Discrete unit of work"

[type.bug]
icon = "✖"
color = "red"
description = "Defect to fix"

# --- Statuses ---
# Follows the ADO new → active → resolved → closed progression.
# "removed" is in values but omitted from filter_cycle and lifecycle.

[status]
values = ["active", "new", "resolved", "closed", "removed"]
initial = "new"
archive = ["closed", "removed"]
filter_cycle = ["new", "active", "resolved", "closed"]
default_color = "dim"

[status.colors]
new = "dim"
active = "green"
resolved = "blue"
closed = "dim"
removed = "dim"

[status.descriptions]
new = "Not yet triaged"
active = "In progress"
resolved = "Fix or feature complete, pending verification"
closed = "Verified and closed"
removed = "Discarded or no longer relevant"

# Lifecycle transitions define what happens when you press 'a' (forward) or 'A' (reverse)
# on a note. Each key maps to the next status in that direction.

[status.lifecycle.forward]
new = "active"
active = "resolved"
resolved = "closed"
closed = "new"

[status.lifecycle.reverse]
closed = "resolved"
resolved = "active"
active = "new"
new = "closed"

# --- Priority ---
# enabled: set to false to disable priority entirely (see zettelkasten workflow)
# values: valid priority levels; array order = sort order (first = highest)
#   can be numeric ("1","2","3") or named ("critical","high","low")
# labels: optional short display labels; omit to show "P{value}" (e.g. "P1")
# filter_cycle: subset for ]/[ preset cycling ("all" is auto-prepended); fp picker shows all
# unset_position: where unprioritized notes sort ("first" or "last")

[priority]
values = ["1", "2", "3", "4"]
filter_cycle = ["1", "2", "3", "4"]
unset_position = "last"
default_color = "yellow"

[priority.colors]
1 = "bold-red"         # critical
2 = "yellow"           # high
3 = "yellow"           # medium
4 = "dim"              # low

# Lifecycle for priority up (raise urgency) and down (lower urgency).
# Which key (+/-) maps to which direction depends on ui.priority_plus.

[priority.lifecycle.up]
4 = "3"
3 = "2"
2 = "1"

[priority.lifecycle.down]
1 = "2"
2 = "3"
3 = "4"

# --- Query presets ---

[queries.active-bugs]
order = 10
args = "type=bug status=active"

[queries.p1-features]
order = 20
args = "type=feature priority=1"

[queries.new-items]
order = 30
args = "status=new"

