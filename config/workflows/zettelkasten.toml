# Zettelkasten workflow
# Slip-box method: fleeting → literature → permanent notes

[meta]
name = "Zettelkasten"
description = "Slip-box method for knowledge management"
schema_version = 1

# --- Note types ---
# Follows the classic Zettelkasten note progression:
# fleeting (quick capture) → literature (source notes) → permanent (atomic ideas)

[type]
default_color = "cyan"
values = ["fleeting", "literature", "permanent"]

[type.fleeting]
icon = "◇"
color = "yellow"
description = "Quick capture, to be processed"

[type.literature]
icon = "▪"
color = "blue"
description = "Notes from a source"

[type.permanent]
icon = "◆"
color = "cyan"
description = "Atomic, fully developed idea"

# --- Statuses ---
# Linear maturity progression: draft → review → mature → archived.
# All statuses participate in lifecycle (no tombstones).

[status]
values = ["review", "draft", "mature", "archived"]
initial = "draft"
archive = ["archived"]
filter_cycle = ["draft", "review", "mature", "archived"]
default_color = "dim"

[status.colors]
draft = "yellow"
review = "blue"
mature = "green"
archived = "dim"

[status.descriptions]
draft = "Initial capture, not yet developed"
review = "Being refined and linked"
mature = "Fully developed, well-connected idea"
archived = "No longer actively maintained"

# 'a' advances maturity, 'A' reverses it

[status.lifecycle.forward]
draft = "review"
review = "mature"
mature = "archived"
archived = "draft"

[status.lifecycle.reverse]
archived = "mature"
mature = "review"
review = "draft"
draft = "archived"

# --- Priority ---
# Disabled – Zettelkasten doesn't use priority; notes mature by connection density.

[priority]
enabled = false

# --- Query presets ---

[queries.drafts]
order = 10
args = "status=draft"

[queries.fleeting]
order = 20
args = "type=fleeting"

[queries.review]
order = 30
args = "status=review"

