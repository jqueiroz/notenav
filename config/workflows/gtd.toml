# Getting Things Done workflow
# Types = what it is, statuses = which GTD list it lives on

[meta]
name = "GTD"
description = "Getting Things Done capture-and-process workflow"
schema_version = 1

# --- Note types ---
# Each type represents a kind of note. Shown as icon + name in the TUI.
# values: valid types; array order = display order in grouped view
# icon: single character displayed in the list
# color: named color (red, green, yellow, blue, magenta, cyan, dim, bold-red, etc.)
#   Raw ANSI codes ("31", "31;1") also accepted.
# default_color: fallback for types not explicitly listed

[type]
default_color = "cyan"
values = ["action", "project", "reference"]

[type.action]
icon = "◆"
color = "cyan"
description = "Single concrete action"

[type.project]
icon = "◈"
color = "magenta"
description = "Multi-step outcome"

[type.reference]
icon = "▪"
color = "yellow"
description = "Non-actionable reference material"

# --- Statuses ---
# Maps to GTD lists: inbox (unclarified), next (do now), waiting (delegated),
# someday (parked), done, dropped.
# "dropped" is in values but omitted from filter_cycle; it participates in lifecycle.

[status]
values = ["next", "waiting", "inbox", "someday", "done", "dropped"]
initial = "inbox"
archive = ["done", "dropped"]
filter_cycle = ["inbox", "next", "waiting", "someday", "done"]
default_color = "dim"

[status.colors]
inbox = "yellow"       # needs processing
next = "green"         # ready to do
waiting = "blue"       # blocked on someone else
someday = "dim"        # parked
done = "dim"
dropped = "dim"

[status.descriptions]
inbox = "Captured but not yet clarified"
next = "Clarified and ready to do"
waiting = "Blocked on someone else"
someday = "Parked for later consideration"
done = "Completed"
dropped = "Intentionally removed"

# Lifecycle transitions define what happens when you press 'a' (forward) or 'A' (reverse)
# on a note. Each key maps to the next status in that direction.

[status.lifecycle.forward]
inbox = "next"
next = "done"
waiting = "next"
someday = "next"
done = "inbox"
dropped = "inbox"

[status.lifecycle.reverse]
done = "next"
next = "inbox"
inbox = "someday"
waiting = "inbox"
someday = "dropped"
dropped = "someday"

# --- Priority ---
# enabled: set to false to disable priority entirely (see zettelkasten workflow)
# values: valid priority levels; array order = sort order (first = highest)
#   can be numeric ("1","2","3") or named ("critical","high","low")
# labels: optional short display labels; omit to show "P{value}" (e.g. "P1")
# filter_cycle: subset for ]/[ preset cycling ("all" is auto-prepended); fp picker shows all
# unset_position: where unprioritized notes sort ("first" or "last")

[priority]
values = ["1", "2", "3"]
filter_cycle = ["1", "2", "3"]
unset_position = "last"
default_color = "yellow"

[priority.colors]
1 = "bold-red"
2 = "yellow"
3 = "dim"

# Lifecycle for priority up (raise urgency) and down (lower urgency).
# Which key (+/-) maps to which direction depends on ui.priority_plus.

[priority.lifecycle.up]
3 = "2"
2 = "1"

[priority.lifecycle.down]
1 = "2"
2 = "3"

# --- Query presets ---

[queries.next-actions]
order = 10
args = "type=action status=next"

[queries.inbox]
order = 20
args = "status=inbox"

[queries.waiting]
order = 30
args = "status=waiting"

[queries.someday]
order = 40
args = "status=someday"

