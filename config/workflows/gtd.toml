# Getting Things Done workflow
# Types = what it is, statuses = which GTD list it lives on

[meta]
name = "GTD"
description = "Getting Things Done capture-and-process workflow"
schema = 1

# --- Note types ---

[type]
default_color = "36"   # cyan
values = ["action", "project", "reference"]

[type.action]
icon = "◆"
color = "36"           # cyan
description = "Single concrete action"

[type.project]
icon = "◈"
color = "35"           # magenta
description = "Multi-step outcome"

[type.reference]
icon = "▪"
color = "33"           # yellow
description = "Non-actionable reference material"

# --- Statuses ---
# Maps to GTD lists: inbox (unclarified), next (do now), waiting (delegated),
# someday (parked), done, dropped.
# "dropped" is omitted from filter_cycle but participates in lifecycle.

[status]
values = ["next", "waiting", "inbox", "someday", "done", "dropped"]
initial = "inbox"
archive = ["done", "dropped"]
filter_cycle = ["inbox", "next", "waiting", "someday", "done"]
default_color = "90"   # dim

[status.colors]
inbox = "33"           # yellow – needs processing
next = "32"            # green – ready to do
waiting = "34"         # blue – blocked on someone else
someday = "90"         # dim – parked
done = "90"            # dim
dropped = "90"         # dim

# 'a' advances forward (clarify/complete), 'A' reverses (reopen/defer)

[status.lifecycle.forward]
inbox = "next"
next = "done"
waiting = "next"
someday = "next"
done = "inbox"
dropped = "inbox"

[status.lifecycle.reverse]
done = "next"
next = "inbox"
inbox = "someday"
waiting = "inbox"
someday = "dropped"
dropped = "done"

# --- Priority ---
# 3 levels only (GTD favors context over priority, so keep it light)

[priority]
values = ["1", "2", "3"]
filter_cycle = ["1", "2", "3"]
unset_position = "last"
default_color = "33"           # yellow

[priority.colors]
1 = "31;1"             # bold red
2 = "33"               # yellow
3 = "90"               # dim

[priority.lifecycle.up]
3 = "2"
2 = "1"

[priority.lifecycle.down]
1 = "2"
2 = "3"

# --- Query presets ---

[queries.next-actions]
order = 10
args = "type=action status=next"

[queries.inbox]
order = 20
args = "status=inbox"

[queries.waiting]
order = 30
args = "status=waiting"

[queries.someday]
order = 40
args = "status=someday"

