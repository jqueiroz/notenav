# Cuboid – 4×5×4 notenav workflow
# Four note types, five statuses, four priority levels – an asymmetric extension
# of Zenith for personal wikis and mixed-purpose notebooks.

[meta]
name = "Cuboid"
description = "4×5×4 workflow for personal wikis and mixed notebooks"
schema_version = 1

# --- Note types ---
# Each type represents a kind of note. Shown as icon + name in the TUI.
# values: valid types; array order = display order in grouped view
# icon: single character displayed in the list
# color: named color (red, green, yellow, blue, magenta, cyan, dim, bold-red, etc.)
#   Raw ANSI codes ("31", "31;1") also accepted.
# default_color: fallback for types not explicitly listed

[type]
default_color = "cyan"
values = ["idea", "task", "reference", "ritual"]

[type.idea]
icon = "✦"
color = "magenta"
description = "Captures an early insight; may evolve into tasks or references"

[type.task]
icon = "◆"
color = "cyan"
description = "Concrete, actionable unit of work"

[type.reference]
icon = "▪"
color = "yellow"
description = "Living documentation; continually updated as understanding grows"

[type.ritual]
icon = "◎"
color = "green"
description = "Recurring practice or routine to revisit regularly"

# --- Statuses ---
# values: all valid statuses; array order = display order in grouped view
# archive: statuses hidden by default; press 'zh' for the archive visibility picker
# filter_cycle: subset shown in stats bar per-type breakdown ("all" is auto-prepended); fs picker shows all
# default_color: fallback for statuses not explicitly listed in [status.colors]
#
# "removed" is in values but omitted from filter_cycle and lifecycle.

[status]
values = ["active", "blocked", "new", "done", "removed"]
initial = "new"
archive = ["done", "removed"]
filter_cycle = ["new", "active", "blocked", "done"]
default_color = "dim"

[status.colors]
new = "dim"
active = "green"
blocked = "red"
done = "dim"
removed = "dim"

[status.descriptions]
new = "Not yet started"
active = "Currently being worked on"
blocked = "Waiting on an external dependency"
done = "Completed"
removed = "Discarded or no longer relevant"

# Lifecycle transitions define what happens when you press 'a' (forward) or 'A' (reverse)
# on a note. Each key maps to the next status in that direction.

[status.lifecycle.forward]
new = "active"
active = "done"
done = "new"
blocked = "active"

[status.lifecycle.reverse]
done = "active"
active = "new"
new = "done"
blocked = "new"

# --- Priority ---
# enabled: set to false to disable priority entirely (see zettelkasten workflow)
# values: valid priority levels; array order = sort order (first = highest)
#   can be numeric ("1","2","3") or named ("critical","high","low")
# labels: optional short display labels; omit to show "P{value}" (e.g. "P1")
# filter_cycle: subset shown in stats bar breakdown ("all" is auto-prepended, "none" is auto-appended); fp picker shows all
# unset_position: where unprioritized notes sort ("first" or "last")

[priority]
values = ["1", "2", "3", "4"]
filter_cycle = ["1", "2", "3", "4"]
unset_position = "last"
default_color = "yellow"

[priority.colors]
1 = "bold-red"
2 = "yellow"
3 = "yellow"
4 = "yellow"

# Lifecycle for priority up (raise urgency) and down (lower urgency).
# Which key (+/-) maps to which direction depends on ui.priority_plus.

[priority.lifecycle.up]
4 = "3"
3 = "2"
2 = "1"

[priority.lifecycle.down]
1 = "2"
2 = "3"
3 = "4"

# --- Query presets ---
# Built-in filtered views. Project config can override or clear these.

[queries.inbox]
order = 10
args = "priority=none"

[queries.p1-tasks]
order = 20
args = "type=task priority=1"

[queries.p1-ideas]
order = 30
args = "type=idea priority=1"

[queries.rituals]
order = 40
args = "type=ritual"

[queries.all-active]
order = 50
args = "status=active"
