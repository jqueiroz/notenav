name: Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'config/**'
      - '.github/workflows/smoke-test.yml'
  pull_request:
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'config/**'
      - '.github/workflows/smoke-test.yml'

jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk jq ripgrep bat
          # fzf from apt is too old; install from GitHub
          FZF_VER=$(curl -sI https://github.com/junegunn/fzf/releases/latest | grep -i ^location | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          curl -L "https://github.com/junegunn/fzf/releases/download/${FZF_VER}/fzf-${FZF_VER#v}-linux_amd64.tar.gz" | sudo tar xz -C /usr/local/bin
          # yq-go
          sudo curl -L -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash fzf gawk yq jq ripgrep bat
          # Homebrew's bash 5 must come before /bin/bash 3.2
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: nn --version
        run: bash bin/nn --version

      - name: nn doctor
        run: |
          mkdir -p /tmp/nn-test
          cd /tmp/nn-test
          bash "$GITHUB_WORKSPACE/bin/nn" doctor

      - name: Ad-hoc query (empty notebook)
        run: |
          mkdir -p /tmp/nn-test
          cd /tmp/nn-test
          bash "$GITHUB_WORKSPACE/bin/nn" type=task || true

  smoke-test-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y bash gawk fzf jq go-yq git ripgrep bat curl
          run: |
            mkdir -p /tmp/nn-test
            cd /tmp/nn-test
            bash "$GITHUB_WORKSPACE/bin/nn" --version
            bash "$GITHUB_WORKSPACE/bin/nn" doctor
            bash "$GITHUB_WORKSPACE/bin/nn" type=task || true

  smoke-test-openbsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg_add bash gawk fzf jq git ripgrep bat curl
            # yq-go is not in OpenBSD ports; install from GitHub release
            curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_openbsd_amd64 -o /usr/local/bin/yq
            chmod +x /usr/local/bin/yq
          run: |
            mkdir -p /tmp/nn-test
            cd /tmp/nn-test
            bash "$GITHUB_WORKSPACE/bin/nn" --version
            bash "$GITHUB_WORKSPACE/bin/nn" doctor
            bash "$GITHUB_WORKSPACE/bin/nn" type=task || true
