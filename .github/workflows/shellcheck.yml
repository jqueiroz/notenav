name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'curl/**'
      - 'virtualization/**'
      - '.shellcheckrc'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'curl/**'
      - 'virtualization/**'
      - '.shellcheckrc'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck (lib + bin)
        run: shellcheck -S style --enable=all bin/nn lib/notenav.sh

      - name: ShellCheck (installer)
        run: shellcheck -S style --enable=all curl/install.sh

      - name: ShellCheck (virtualization)
        run: shellcheck -S style --enable=all virtualization/*/*.sh virtualization/*/guest/*.sh
